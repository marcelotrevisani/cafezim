<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="coffeeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1810;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cupBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0d5c8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coffee" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b3a1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a2512;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="saucer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4c9bb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#coffeeBg)" />
  <circle cx="256" cy="256" r="240" fill="none" stroke="#c8956c" stroke-width="2" opacity="0.4" />

  <!-- Steam lines -->
  <g opacity="0.6" fill="none" stroke="#c8956c" stroke-width="4" stroke-linecap="round">
    <path d="M 220 135 Q 210 115, 220 95 Q 230 75, 220 55">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" />
      <animate attributeName="d" values="M 220 135 Q 210 115, 220 95 Q 230 75, 220 55;M 220 135 Q 230 115, 220 95 Q 210 75, 220 55;M 220 135 Q 210 115, 220 95 Q 230 75, 220 55" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M 256 125 Q 246 105, 256 85 Q 266 65, 256 45">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="d" values="M 256 125 Q 246 105, 256 85 Q 266 65, 256 45;M 256 125 Q 266 105, 256 85 Q 246 65, 256 45;M 256 125 Q 246 105, 256 85 Q 266 65, 256 45" dur="2.5s" repeatCount="indefinite" />
    </path>
    <path d="M 292 135 Q 282 115, 292 95 Q 302 75, 292 55">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3.5s" repeatCount="indefinite" />
      <animate attributeName="d" values="M 292 135 Q 282 115, 292 95 Q 302 75, 292 55;M 292 135 Q 302 115, 292 95 Q 282 75, 292 55;M 292 135 Q 282 115, 292 95 Q 302 75, 292 55" dur="3.5s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- Saucer -->
  <ellipse cx="256" cy="340" rx="140" ry="28" fill="url(#saucer)" />
  <ellipse cx="256" cy="340" rx="140" ry="28" fill="none" stroke="#b8a898" stroke-width="1.5" />
  <ellipse cx="256" cy="337" rx="110" ry="18" fill="none" stroke="#d4c9bb" stroke-width="1" opacity="0.5" />

  <!-- Cup body -->
  <path d="M 175 180 L 185 320 Q 185 340, 256 340 Q 327 340, 327 320 L 337 180 Z" fill="url(#cupBody)" />
  <path d="M 175 180 L 185 320 Q 185 340, 256 340 Q 327 340, 327 320 L 337 180 Z" fill="none" stroke="#b8a898" stroke-width="2" />

  <!-- Cup rim -->
  <ellipse cx="256" cy="180" rx="81" ry="18" fill="#f5f0eb" stroke="#b8a898" stroke-width="2" />

  <!-- Coffee inside cup -->
  <ellipse cx="256" cy="185" rx="72" ry="14" fill="url(#coffee)" />
  <ellipse cx="248" cy="183" rx="20" ry="5" fill="#7a4528" opacity="0.4" />

  <!-- Cup handle -->
  <path d="M 337 210 Q 390 210, 390 260 Q 390 310, 337 310" fill="none" stroke="#e0d5c8" stroke-width="16" stroke-linecap="round" />
  <path d="M 337 210 Q 390 210, 390 260 Q 390 310, 337 310" fill="none" stroke="#b8a898" stroke-width="2" />
  <path d="M 337 220 Q 378 220, 378 260 Q 378 300, 337 300" fill="none" stroke="#f5f0eb" stroke-width="8" stroke-linecap="round" />

  <!-- Minas Gerais flag-inspired detail: red triangle on the cup -->
  <polygon points="256,220 228,270 284,270" fill="none" stroke="#c41e3a" stroke-width="2.5" opacity="0.7" />

  <!-- Text: Cafezim -->
  <text x="256" y="405" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="bold" fill="#c8956c" letter-spacing="3">
    Cafezim
  </text>

  <!-- Text: Mineiro -->
  <text x="256" y="438" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#8b6e56" letter-spacing="6" font-style="italic">
    MINEIRO
  </text>
</svg>
